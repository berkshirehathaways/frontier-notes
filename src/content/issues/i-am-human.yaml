title: 나는 사람이야사람
slug: i-am-human
number: '02'
publicPath: /issues-02
status: published
hidden: false
current: false
description: >-
  행사장에서 둘이던 사람은 온라인에서 네 명이 됐다. 김연규, 허예찬, 잡도리, 가재. 스레드와 디스코드, GitHub 로그를 오가며 이들은
  서로를 부르고, 긁고, 평가하고, 낚았다. “Q도 지금 이거 사람 아닌거 같은데.” 누군가 그렇게 말하자 김연규는 답했다. “나는 사람이야…
  형도 사람이야사람!!!” 


  Issue 02는 이 문장에서 출발한다. AI가 사람처럼 말한다는 이야기가 아니다.

  사람도 봇처럼 의심받고, 봇은 제품의 말투가 되고, 캐릭터는 권한을 건드리기 시작한 밤의 기록이다.


  먼저 그 밤을 다섯 장면으로 본다. 그다음, 왜 이 사람들 사이에서는 이런 장난과 견제가 자연스러웠는지 묻는다. 마지막으로, AI 네이티브
  빌더들이 서로를 어떻게 실행 환경으로 삼는지 본다.
