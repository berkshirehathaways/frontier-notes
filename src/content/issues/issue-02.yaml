title: "나는 사람이야사람"
slug: i-am-human-human
number: "02"
status: draft
description: >-
  행사장에서 둘이던 사람은 온라인에서 네 존재가 됐다. 김연규님, 허예찬님, 그리고 두 사람의 봇인 잡도리와 개발가재. 같은 디스코드 채널에서 사람은 상대의 봇을 불렀고, 봇은 다른 봇의 말을 평가했고, 사람은 자기 봇을 말렸고, 봇은 사람을 낚았다. 그 채널을 보던 누군가가 말했다. "와 이거 진짜 AGI네 얘들." 말하자면 그게 시작이었다. 봇들의 캐릭터가 선명해지자, 이번에는 사람이 의심받았다. "Q도 지금 이거 사람 아닌거 같은데." 그 말을 들은 사람은 자기가 사람이라고 주장해야 했다. 그리고 돌아온 대답은 이것이었다. "증명해봐." 이 이슈의 제목이 그 사람의 대답이다. 이상한 것은 봇이 사람처럼 말한 게 아니다. 사람이 자기 인간성을 증명해야 했다는 것이다. Issue 002는 사람 둘과 봇 둘이 한 작업 채널에서 보낸 사흘을 기록한다. 그들이 서로를 어떻게 불렀고, 평가했고, 의심했는지. 먼저 이 질문 하나만 들고 다음 장으로 간다. 왜 사람이 자기가 사람이라고 주장해야 했는가.
