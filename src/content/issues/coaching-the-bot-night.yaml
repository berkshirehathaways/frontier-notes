description: >-
  "얼른 레포 파쿠리해서 만드세요." 포켓몬을 에이전트가 깨는 행사에서 이 말은 농담처럼 나왔지만, 그 공간에서는 가장 빠른 작업 지시처럼
  들렸다. AI는 생각보다 자주 길을 잃었고, 방 하나를 나가는 것도 어려워했다. 그런데 사람들은 그 실패를 숨기지 않고, 레포를 열고,
  하네스를 깎고, 끝날 때까지 다시 이야기했다. Issue 01은 실패하는 에이전트를 둘러싼 사람들의 말과 작업 방식을 기록한다.
